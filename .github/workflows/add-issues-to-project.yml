name: Add Issues to Project Board

# Automatically adds every new or transferred issue to the project board.
#
# Required secret: PROJECT_TOKEN
#   A classic PAT with scopes: project, repo
#   Stored as a repository secret named PROJECT_TOKEN.

on:
  issues:
    types: [opened, transferred]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/Faraclas/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}
