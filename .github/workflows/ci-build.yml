# Build Test CI — runs ebuild compile + verify for packages.
#
# Two trigger modes:
#
#   1. **PR (automatic)** — detects changed packages when the
#      'build-test' label is present on the pull request.
#      PRs from the Copilot coding agent with ebuild changes get
#      the label applied automatically.
#
#   2. **Manual dispatch** — pick a specific package and ebuild
#      from the GitHub Actions UI (Actions → Build Test Changed
#      Ebuilds → Run workflow).
#
# Additionally, every PR with a new ebuild version posts a diff
# comment comparing the new ebuild against the previous version.
#
# Phase 2.3 of the implementation plan.

name: Build Test Changed Ebuilds

on:
  pull_request:
    types:
      - opened
      - labeled
      - synchronize
    paths:
      - "**.ebuild"
      - "**/metadata.xml"
      - "**/Manifest"
      - "**/files/**"

  workflow_dispatch:
    inputs:
      package_dir:
        description: >
          Package directory (e.g. app-editors/zed)
        required: true
        type: string
      ebuild_file:
        description: >
          Ebuild filename (e.g. zed-0.229.0.ebuild)
        required: true
        type: string
      container_image:
        description: >
          Container image for the build
        required: false
        type: choice
        options:
          - ghcr.io/faraclas/adaptive-overlay/testenv:latest
          - ghcr.io/faraclas/adaptive-overlay/testenv-audio:latest
          - ghcr.io/faraclas/adaptive-overlay/testenv-rust:latest
        default: ghcr.io/faraclas/adaptive-overlay/testenv:latest
      verify_script:
        description: >
          Verify script path (blank to skip)
        required: false
        type: string
        default: ""

jobs:
  # -----------------------------------------------------------------------
  # Auto-label: if the PR author is the Copilot coding agent and the PR
  # contains ebuild changes, apply the 'build-test' label automatically.
  # This makes the build-test pipeline fire without manual intervention.
  # Only runs on 'opened' and 'synchronize' events (not 'labeled', to
  # avoid a re-trigger loop).
  # -----------------------------------------------------------------------
  auto-label:
    name: Auto-label Copilot PRs
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request'
      && github.event.action != 'labeled'
      && (github.event.pull_request.user.login == 'Copilot'
          || github.event.pull_request.user.login == 'copilot-swe-agent[bot]')

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check if build-test label already present
        id: check
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          if echo "${LABELS}" | jq -e '.[] | select(. == "build-test")' > /dev/null 2>&1; then
            echo "already_labeled=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_labeled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Add build-test label
        if: steps.check.outputs.already_labeled == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-label "build-test"
          echo "Added 'build-test' label to PR #${{ github.event.pull_request.number }}"

  # -----------------------------------------------------------------------
  # Ebuild diff: post a PR comment showing the diff between the new
  # ebuild and the previous version. Since version bumps create a new
  # file (e.g. zed-0.229.0.ebuild), git sees it as an addition — this
  # job finds the old version on the base branch and diffs them.
  # -----------------------------------------------------------------------
  ebuild-diff:
    name: Post ebuild diff comment
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request'
      && github.event.action != 'labeled'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate and post ebuild diffs
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Find new ebuild files added in this PR.
          NEW_EBUILDS=$(git diff --name-status "${BASE}" "${HEAD}" \
            | grep -E '^A.*\.ebuild$' \
            | awk '{print $2}' || true)

          if [ -z "${NEW_EBUILDS}" ]; then
            echo "No new ebuild files in this PR — skipping diff comment."
            exit 0
          fi

          # Build the comment body entirely via file writes to avoid
          # YAML parsing issues with inline backticks and HTML tags.
          COMMENT_FILE=$(mktemp)
          FOUND_DIFF=false

          # Write the header.
          cat > "${COMMENT_FILE}" <<'HEADER'
          <!-- ebuild-diff-bot -->
          ## Ebuild Version Diff

          Comparing previous ebuild version(s) against the new one(s) in this PR.

          HEADER
          sed -i 's/^          //' "${COMMENT_FILE}"

          while IFS= read -r NEW_EBUILD; do
            PKG_DIR=$(dirname "${NEW_EBUILD}")
            NEW_BASENAME=$(basename "${NEW_EBUILD}")

            # Find the previous version ebuild on the base branch.
            # List ebuilds that existed on the base, exclude the new one,
            # sort by version, take the highest.
            OLD_EBUILD=$(git ls-tree --name-only "${BASE}" -- "${PKG_DIR}/" \
              | grep '\.ebuild$' \
              | grep -v "/${NEW_BASENAME}$" \
              | sort -V \
              | tail -1 || true)

            if [ -z "${OLD_EBUILD}" ]; then
              echo "No previous ebuild found for ${NEW_EBUILD} — skipping."
              continue
            fi

            OLD_PATH="${OLD_EBUILD}"
            OLD_BASENAME=$(basename "${OLD_EBUILD}")

            echo "Diffing: ${OLD_PATH} (base) -> ${NEW_EBUILD} (head)"

            # Extract file contents from the respective commits.
            OLD_CONTENT=$(git show "${BASE}:${OLD_PATH}" 2>/dev/null || true)
            NEW_CONTENT=$(git show "${HEAD}:${NEW_EBUILD}" 2>/dev/null || true)

            if [ -z "${OLD_CONTENT}" ]; then
              echo "Could not read ${OLD_PATH} from base — skipping."
              continue
            fi

            # Generate the diff into a temp file.
            DIFF_FILE=$(mktemp)
            diff -u \
              --label "a/${OLD_PATH}" \
              --label "b/${NEW_EBUILD}" \
              <(echo "${OLD_CONTENT}") \
              <(echo "${NEW_CONTENT}") > "${DIFF_FILE}" || true

            FOUND_DIFF=true

            # Write this section to the comment file.
            printf '### Ebuild diff: `%s` → `%s`\n\n' \
              "${OLD_BASENAME}" "${NEW_BASENAME}" >> "${COMMENT_FILE}"
            printf '<details>\n<summary>Click to expand diff</summary>\n\n' \
              >> "${COMMENT_FILE}"
            printf '```diff\n' >> "${COMMENT_FILE}"

            if [ -s "${DIFF_FILE}" ]; then
              cat "${DIFF_FILE}" >> "${COMMENT_FILE}"
            else
              echo "No differences (files are identical)." >> "${COMMENT_FILE}"
            fi

            printf '\n```\n\n</details>\n\n' >> "${COMMENT_FILE}"
            rm -f "${DIFF_FILE}"

          done <<< "${NEW_EBUILDS}"

          if [ "${FOUND_DIFF}" = "false" ]; then
            echo "No diffs to post."
            rm -f "${COMMENT_FILE}"
            exit 0
          fi

          # Write footer.
          printf -- '---\n*Auto-generated by the Build Test CI workflow.*\n' \
            >> "${COMMENT_FILE}"

          # Delete any previous diff comment from this bot to avoid
          # accumulating stale comments on synchronize events.
          MARKER="<!-- ebuild-diff-bot -->"
          EXISTING_COMMENT_ID=$(gh api \
            "/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            | head -1 || true)

          if [ -n "${EXISTING_COMMENT_ID}" ]; then
            gh api \
              --method DELETE \
              "/repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID}" \
              || echo "Warning: could not delete old diff comment"
          fi

          # Post the comment.
          gh pr comment "${PR_NUMBER}" \
            --repo "${{ github.repository }}" \
            --body-file "${COMMENT_FILE}"

          rm -f "${COMMENT_FILE}"
          echo "Posted ebuild diff comment on PR #${PR_NUMBER}."

  # -----------------------------------------------------------------------
  # Gate: only proceed if the 'build-test' label is present.
  # Skipped entirely for manual dispatch runs.
  # -----------------------------------------------------------------------
  check-label:
    name: Check for build-test label
    runs-on: ubuntu-latest
    needs: auto-label
    # Always run even if auto-label was skipped (non-copilot PRs) or
    # the label was already present.
    if: >
      github.event_name == 'pull_request'
      && !failure() && !cancelled()

    permissions:
      contents: read
      pull-requests: read

    outputs:
      has_label: ${{ steps.label.outputs.has_label }}

    steps:
      # Re-fetch PR data so we pick up labels added by auto-label.
      - name: Check label
        id: label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch current labels from the API (not the event payload)
          # so we see any labels added by the auto-label job.
          LABELS=$(gh api \
            "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels" \
            --jq '.[].name')

          echo "Current PR labels: ${LABELS}"

          if echo "${LABELS}" | grep -qx 'build-test'; then
            echo "has_label=true" >> "$GITHUB_OUTPUT"
            echo "build-test label is present — proceeding with build tests"
          else
            echo "has_label=false" >> "$GITHUB_OUTPUT"
            echo "build-test label not present — skipping build tests"
            echo "::notice::Add the 'build-test' label to this PR to trigger build testing."
          fi

  # -----------------------------------------------------------------------
  # Detect which package directories have changed.
  # Skipped entirely for manual dispatch runs.
  # Uses !cancelled() to opt out of transitive skip-propagation from
  # auto-label → check-label chain (GitHub Actions skips downstream
  # jobs when any ancestor was skipped, unless explicitly overridden).
  # -----------------------------------------------------------------------
  detect-changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    needs: check-label
    if: >
      !cancelled()
      && needs.check-label.result == 'success'
      && needs.check-label.outputs.has_label == 'true'

    permissions:
      contents: read

    outputs:
      packages: ${{ steps.changed.outputs.packages }}
      any_changed: ${{ steps.changed.outputs.any_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find changed packages and their newest ebuilds
        id: changed
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          echo "Diffing ${BASE}..${HEAD}"

          # Get unique changed package directories
          CHANGED_DIRS=$(git diff --name-only "${BASE}" "${HEAD}" \
            | grep -E '^[^/]+/[^/]+/' \
            | awk -F/ '{print $1"/"$2}' \
            | sort -u)

          if [ -z "${CHANGED_DIRS}" ]; then
            echo "packages=[]"      >> "$GITHUB_OUTPUT"
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For each changed directory, find the newest ebuild file.
          # Output a JSON array of objects:
          #   [{"package_dir":"app-editors/zed","ebuild_file":"zed-0.227.1.ebuild"}, ...]
          PACKAGES="["
          FIRST=1
          while IFS= read -r PKG_DIR; do
            # Find all ebuild files in this directory, pick the newest by
            # version sort on the filename.
            NEWEST=$(ls "${PKG_DIR}"/*.ebuild 2>/dev/null \
              | xargs -I{} basename {} \
              | sort -V \
              | tail -1)

            if [ -z "${NEWEST}" ]; then
              echo "Warning: no .ebuild files found in ${PKG_DIR}, skipping" >&2
              continue
            fi

            # Determine which container image to use for this package.
            # app-editors/zed requires the Rust/LLVM image.
            if [ "${PKG_DIR}" = "app-editors/zed" ]; then
              IMAGE="ghcr.io/faraclas/adaptive-overlay/testenv-rust:latest"
              VERIFY="containers/testenv-rust/verify-zed.sh"
            elif echo "${PKG_DIR}" | grep -q '^media-sound/'; then
              IMAGE="ghcr.io/faraclas/adaptive-overlay/testenv-audio:latest"
              VERIFY=""
            else
              IMAGE="ghcr.io/faraclas/adaptive-overlay/testenv:latest"
              VERIFY=""
            fi

            [ "${FIRST}" -eq 0 ] && PACKAGES="${PACKAGES},"
            PACKAGES="${PACKAGES}{\"package_dir\":\"${PKG_DIR}\",\"ebuild_file\":\"${NEWEST}\",\"container_image\":\"${IMAGE}\",\"verify_script\":\"${VERIFY}\"}"
            FIRST=0
          done <<< "${CHANGED_DIRS}"
          PACKAGES="${PACKAGES}]"

          echo "Changed packages: ${PACKAGES}"
          echo "packages=${PACKAGES}" >> "$GITHUB_OUTPUT"

          if [ "${PACKAGES}" = "[]" ]; then
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          fi

  # -----------------------------------------------------------------------
  # PR path: run test-ebuild for each changed package in parallel.
  # -----------------------------------------------------------------------
  build-test:
    name: Build (PR)
    needs: detect-changes
    if: >
      !cancelled()
      && needs.detect-changes.result == 'success'
      && needs.detect-changes.outputs.any_changed == 'true'

    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}

    uses: ./.github/workflows/test-ebuild.yml
    with:
      package_dir: ${{ matrix.package.package_dir }}
      ebuild_file: ${{ matrix.package.ebuild_file }}
      container_image: ${{ matrix.package.container_image }}
      verify_script: ${{ matrix.package.verify_script }}

  # -----------------------------------------------------------------------
  # Manual dispatch path: build the user-specified package directly.
  # -----------------------------------------------------------------------
  build-manual:
    name: Build (manual)
    if: github.event_name == 'workflow_dispatch'

    uses: ./.github/workflows/test-ebuild.yml
    with:
      package_dir: ${{ inputs.package_dir }}
      ebuild_file: ${{ inputs.ebuild_file }}
      container_image: ${{ inputs.container_image }}
      verify_script: ${{ inputs.verify_script }}
